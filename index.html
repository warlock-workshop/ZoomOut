<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- Internes Mockup: soll erreichbar sein, aber nicht auffindbar. Kein Disallow in
     einer robots.txt — dann käme der Crawler gar nicht erst bis hierher und würde
     dieses noindex nie lesen; die URL könnte trotzdem im Index landen. -->
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<!-- Auf dem Homescreen ist nur Platz für ~12 Zeichen; ohne das hier stünde der
     abgeschnittene <title> unter dem Icon -->
<meta name="apple-mobile-web-app-title" content="Bilderkennung">
<!-- Uhr und Batterie weiß über dem Bild, statt weißer Leiste über schwarzem Spiel.
     Der Kopf fängt die Statusleiste per env(safe-area-inset-top) ab. -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<title>ZEIT Bilderkennung</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  /* Farben Pixel für Pixel aus einem Screenshot der ZEIT-App (Dark Mode) gemessen —
     nicht geschätzt. Auffällig: die Grautöne sind exakt neutral (R=G=B), kein
     Blaustich, und der Grund ist #111 statt reinem Schwarz. */
  :root {
    --bg: #111111;        /* Grundfläche */
    --card: #212121;      /* Karten wie die Ergebnis-Box in der App */
    --pill: #1F1F1F;      /* die schwebende Tab-Leiste */
    --ink: #F5F6F6;       /* Text */
    --muted: #949494;     /* Dachzeilen, Sekundärtext */
    --line: #2C2C2C;      /* Trennlinien und Rahmen */
    --accent: #E0352F;    /* ZEIT-Rot, gemessen am Z+-Badge. Signalfarbe, sonst nichts */
    --edge: 16px;         /* Seitenrand der App */

    /* Die echten Hausschriften (Tablet Gothic für Headlines/UI, FF Franziska für
       Fließtext) sind Kaufschriften. Nächste Näherung, die auf Mac UND iPhone
       vorinstalliert ist — so bleibt die Datei eigenständig und lädt nichts nach. */
    --font-head: "Helvetica Neue", Helvetica, Arial, sans-serif;
    --font-text: Charter, "Iowan Old Style", Georgia, serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.4 var(--font-text);
    height: 100dvh; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }

  /* Der Kern der ZEIT-Anmutung: fett, eng gesetzt, echte Silbentrennung.
     Ohne lang="de" am <html> trennt Safari nach englischen Regeln. */
  .head {
    font-family: var(--font-head); font-weight: 700;
    letter-spacing: -0.02em; line-height: 1.05;
    hyphens: auto; -webkit-hyphens: auto;
  }

  /* Kopf wie in der App: randloser Balken über die volle Breite, Haarlinie unten —
     keine schwebende Karte, kein Milchglas */
  header {
    position: fixed; z-index: 2;
    top: 0; left: 0; right: 0;
    padding: calc(10px + env(safe-area-inset-top)) var(--edge) 10px;
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--bg); border-bottom: 1px solid var(--line);
  }
  header .meta { display: flex; flex-direction: column; gap: 2px; }
  /* Der echte ZEIT-Schriftzug ist eine Individualschrift des Verlags und nicht
     nachbaubar. Nur die Anmutung: Antiqua-Versalien, daneben die Grotesk. */
  header h1 { margin: 0; font-size: 17px; font-weight: normal; line-height: 1; }
  header h1 .zeit { font-family: var(--font-text); letter-spacing: 0.14em; }
  header h1 .game { font-family: var(--font-head); font-weight: 700; letter-spacing: -0.01em; }
  header .sub { font-size: 11px; font-family: var(--font-head); color: var(--muted); }
  header .sub b { color: var(--muted); font-weight: 400; font-variant-numeric: tabular-nums; }
  .ptsbox { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  #pointsNow { font-family: var(--font-head); font-size: 30px; font-weight: 700;
    line-height: 0.9; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
  #zoomLvl { font-size: 11px; font-family: var(--font-head); color: var(--muted);
    font-variant-numeric: tabular-nums; }

  main {
    position: fixed; z-index: 2;
    left: var(--edge); right: var(--edge);
    bottom: calc(10px + env(safe-area-inset-bottom) + var(--kb, 0px));
    display: flex; flex-direction: column; gap: 10px;
    pointer-events: none;  /* no panel: let touches reach the painting between controls */
  }
  main .guessbar, main .tabbar { pointer-events: auto; }
  /* while typing, collapse to input + feedback so keyboard + chrome leave the painting visible */
  main.typing .tabbar { display: none; }

  /* zen view: swipe the chrome away to study the painting */
  header, main { transition: transform 0.28s ease; }
  body.zen header { transform: translateY(-100%); }
  body.zen main { transform: translateY(calc(100% + 48px)); }
  #showui {
    position: fixed; z-index: 3; left: 50%;
    bottom: calc(10px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(250%);  /* parked off-screen */
    width: 60px; height: 36px; padding: 0; flex: none;
    background: var(--pill); border: 1px solid var(--line);
    border-radius: 999px; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.28s ease;
  }
  body.zen #showui { transform: translateX(-50%) translateY(0); }

  .stage {
    position: fixed; inset: 0; z-index: 0;
    background: #000;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    touch-action: none;  /* we handle pinch ourselves */
  }
  .stage img {
    max-width: 100%; max-height: 100%;
    transform-origin: var(--fx) var(--fy);
    transform: scale(var(--scale));
    -webkit-user-drag: none; pointer-events: none;
  }
  /* only while the grace rewind settles — a transition during the live glide would drag */
  .stage img.settling { transition: transform 0.22s ease-out; }
  .stage .vignette { position: absolute; inset: 0; pointer-events: none;
    box-shadow: inset 0 0 140px 30px rgba(0,0,0,0.55); }
  .stage .hint { position: absolute; top: calc(84px + env(safe-area-inset-top)); left: var(--edge); right: var(--edge);
    text-align: center; font-size: 12px; font-family: var(--font-head);
    color: var(--muted); pointer-events: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8); }

  .guessbar { position: relative; flex: 0 0 auto; display: none; }
  main.solving .guessbar { display: block; }
  .guessbar input[type=text] {
    width: 100%; padding: 14px 16px; font: inherit; font-size: 17px;
    background: var(--card); color: var(--ink);
    border: 1px solid var(--line); border-radius: 8px;
    -webkit-user-select: text; user-select: text;
  }
  .guessbar input[type=text]::placeholder { color: var(--muted); }
  .guessbar input[type=text]:focus { outline: none; border-color: var(--muted); }

  /* Vorschlagsliste wie eine App-Liste: flach, dunkel, Haarlinien statt Milchglas */
  .suggestions {
    position: absolute; bottom: calc(100% + 6px); left: 0; right: 0;
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden; z-index: 5; max-height: 40vh; overflow-y: auto;
  }
  .suggestions .item {
    padding: 13px 16px; cursor: pointer; border-bottom: 1px solid var(--line);
    font-family: var(--font-head); font-size: 15px;
  }
  .suggestions .item:last-child { border-bottom: none; }
  .suggestions .item small { color: var(--muted); }
  .suggestions .item.active { background: #2A2A2A; }

  /* Die Bedienleiste ist die Tab-Pille der ZEIT-App — dieselbe Leiste, in der in der
     App „Spiele“ steht. Zoom bekommt den doppelten Anteil: er ist der
     Haupt-Interaktionspunkt und muss im Gehen zielbar bleiben. */
  .tabbar {
    display: flex; align-items: stretch; flex: 0 0 auto; padding: 5px;
    background: var(--pill); border: 1px solid var(--line); border-radius: 999px;
  }
  .tabbar button {
    flex: 1; padding: 7px 4px; border: none; border-radius: 999px;
    background: none; color: var(--muted); cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-family: var(--font-head); font-size: 11px; letter-spacing: 0.01em;
    touch-action: manipulation;
  }
  .tabbar button svg { width: 22px; height: 22px; display: block; }
  #zoomout { flex: 2; color: var(--ink); }
  /* die einzige Stelle, an der die Signalfarbe im Spiel auftaucht */
  #zoomout.holding { background: var(--accent); color: #fff; }

  button {
    padding: 13px 16px; font: inherit; font-family: var(--font-head); font-size: 15px;
    cursor: pointer; background: var(--card); color: var(--ink);
    border: 1px solid var(--line); border-radius: 6px; flex: 1;
  }
  button.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); font-weight: 700; }

  .flash { min-height: 18px; font-size: 13px; text-align: center; flex: 0 0 auto;
    font-family: var(--font-head);
    text-shadow: 0 1px 4px rgba(0,0,0,0.9); }
  .flash.bad { color: var(--muted); }
  .flash.good { color: var(--ink); }

  /* Die Auflösung ist ein Ergebnis, kein Artikel — also nach dem Muster des
     Ergebnis-Blocks der App gebaut (Überschrift, graue Datenzeile, Ergebnis-Kasten),
     nicht nach dem eines Artikel-Aufmachers. */
  .reveal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: none; align-items: center; justify-content: center; z-index: 20; padding: 16px;
  }
  .reveal.show { display: flex; }
  .reveal .card {
    background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
    max-width: 440px; width: 100%; max-height: 92vh; overflow-y: auto;
    text-align: left;
  }
  /* Das Gemälde immer vollständig zeigen, egal ob Hoch- oder Querformat: das Bild
     wird in den Rahmen eingepasst statt ihn zu füllen. Bei Hochformat bleiben
     seitlich schwarze Ränder — das ist der Preis dafür, nichts abzuschneiden. */
  .reveal .card .shot {
    background: #000; border-radius: 7px 7px 0 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .reveal .card img {
    display: block; max-width: 100%; max-height: 34vh;
    width: auto; height: auto; margin: 0;
  }
  .reveal .card img:not([src]) { display: none; }   /* Endstand: kein Bild, .shot fällt zusammen */
  .artbody { padding: 16px var(--edge) var(--edge); }
  .reveal .card h2 { margin: 0 0 6px; font-size: 27px; }
  /* eine Datenzeile, keine Artikel-Dachzeile: Künstler · Jahr · Epoche */
  .reveal .card .by {
    font-family: var(--font-head); font-size: 14px; color: var(--muted); margin-bottom: 14px;
  }
  /* Ergebnis-Kasten nach dem Vorbild der Spielstand-Box in der App */
  .scorebox {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 14px var(--edge); margin-bottom: 16px;
    font-family: var(--font-head);
  }
  .scorebox .label { font-size: 15px; color: var(--muted); }
  .scorebox .earned { font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums; }
  .scorebox .earned.zero { color: var(--muted); }
  .reveal .card .desc {
    font-family: var(--font-text); font-size: 15px; line-height: 1.5;
    color: var(--ink); margin: 0 0 16px;
  }
  .reveal .card .desc:empty { display: none; }
  .reveal .card button { width: 100%; }
</style>
</head>
<body>
<div class="stage" id="stage">
  <img id="art" alt="Gemälde-Ausschnitt">
  <div class="vignette"></div>
  <div class="hint" id="hint">„Zoom“ halten, um mehr aufzudecken — zurück geht es nicht</div>
</div>

<header>
  <div class="meta">
    <h1><span class="zeit">ZEIT</span> <span class="game">Bilderkennung</span></h1>
    <span class="sub">Bild <b id="roundNo">1</b>/<b id="roundTot">?</b> · Gesamt <b id="total">0</b></span>
  </div>
  <div class="ptsbox">
    <b id="pointsNow">1000</b>
    <span id="zoomLvl">×12.0</span>
  </div>
</header>

<main>
  <div class="guessbar">
    <input type="text" id="guess" placeholder="Bild oder Künstler eingeben…" autocomplete="off"
           autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="suggestions" id="suggestions" hidden></div>
  </div>

  <div class="flash" id="flash"></div>

  <nav class="tabbar">
    <button id="giveup" aria-label="Aufgeben">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
        <path d="M6 6l12 12M18 6L6 18"/>
      </svg>
      Aufgeben
    </button>
    <button id="zoomout" aria-label="Herauszoomen, gedrückt halten">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
        <circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5L21 21M7.5 10.5h6"/>
      </svg>
      Zoom
    </button>
    <button id="solve" aria-label="Raten">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 12.5l5 5L20 6.5"/>
      </svg>
      Raten
    </button>
  </nav>
</main>

<button id="showui" aria-label="Bedienung einblenden">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M6 15l6-6 6 6"/>
  </svg>
</button>

<div class="reveal" id="reveal">
  <div class="card">
    <div class="shot"><img id="revealImg" alt=""></div>
    <div class="artbody">
      <h2 class="head" id="revealTitle"></h2>
      <div class="by" id="revealBy"></div>
      <div class="scorebox" id="scorebox">
        <span class="label">Punkte</span>
        <b class="earned" id="revealEarned"></b>
      </div>
      <p class="desc" id="revealDesc"></p>
      <button class="primary" id="nextBtn">Nächstes Bild</button>
    </div>
  </div>
</div>

<script>
(function () {
  const MAX_POINTS = 1000;
  const MIN_POINTS = 100;
  const WRONG_PENALTY_PCT = 0.15; // wrong guess costs a share of what's left, not a flat sum:
                                  // stings the same at 1000 as at 200, never wrecks a round
  const PINCH_SENS = 0.35;      // <1 = gentler pinch; low = fine, deliberate art-critic control
  const ZOOM_TAP_FACTOR = 0.96; // the least a press ever does: a 4% stutter outward
  const ZOOM_HOLD_START = 0.85; // hold begins feather-slow (per-second scale factor)...
  const ZOOM_HOLD_FULL  = 0.75; // ...and ramps to this full glide speed (~9s from ×12 to full view)
  const ZOOM_HOLD_RAMP  = 1.2;  // seconds of holding to reach full speed
  const GRACE_MS = 300;     // reaction rebate: releasing rewinds the last 300ms of glide, so the
                            // gap between "I recognise it!" and finger-up costs nothing
  const TOUCH_COST = 200;   // flat cost the moment you zoom out at all ("Smart Boys' Bonus" gate)

  const $ = (id) => document.getElementById(id);
  const stage = $("stage"), art = $("art");
  const guessInput = $("guess"), suggestions = $("suggestions"), flash = $("flash"), hint = $("hint");

  let deck = [], round = 0, cur = null;
  let scale = 7, minScaleReached = 7, wrongMult = 1, total = 0, activeSugg = -1;

  function shuffle(a) {
    a = a.slice();
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }

  // remember played paintings across reloads; deal unplayed ones first
  const SEEN_KEY = "zoomout_seen";
  let seen = [];
  try { seen = JSON.parse(localStorage.getItem(SEEN_KEY)) || []; } catch (e) {}
  function buildDeck() {
    let unseen = window.PAINTINGS.filter(p => !seen.includes(p.id));
    if (!unseen.length) {  // played them all — start the cycle over
      seen = [];
      try { localStorage.removeItem(SEEN_KEY); } catch (e) {}
      unseen = window.PAINTINGS.slice();
    }
    const rest = window.PAINTINGS.filter(p => !unseen.includes(p));
    return shuffle(unseen).concat(shuffle(rest));
  }
  function markSeen(id) {
    if (seen.includes(id)) return;
    seen.push(id);
    try { localStorage.setItem(SEEN_KEY, JSON.stringify(seen)); } catch (e) {}
  }

  // Price per doubling, not per scale step. What you learn depends on the visible
  // *area*, which grows quadratically as you pull out — so charging linearly by scale
  // burns half the budget between ×12 and ×6, where 0.7% → 2.8% of the canvas is
  // showing and nothing is recognisable yet. Logarithmic frac makes every halving of
  // the zoom cost the same (~195 points): cheap while blind, expensive once telling.
  function potential() {
    const s = cur.startScale;
    const frac = Math.log(minScaleReached) / Math.log(s);   // 1 at start scale → 0 at full view
    const untouched = minScaleReached >= s - 0.01;   // never zoomed out at all
    const fromZoom = untouched
      ? MAX_POINTS                                   // full 1000: the Smart Boys' Bonus
      : MIN_POINTS + (MAX_POINTS - TOUCH_COST - MIN_POINTS) * frac;  // 800 → 100
    return Math.max(0, Math.round(fromZoom * wrongMult));
  }

  function setScale(v) {
    scale = Math.max(1, Math.min(scale, v));  // one-way: can only zoom further out
    art.style.setProperty("--scale", scale);
    if (scale < minScaleReached) minScaleReached = scale;
    $("pointsNow").textContent = potential();
    $("zoomLvl").textContent = "×" + scale.toFixed(1);
  }
  function resetScale(v) {  // the only way scale ever goes back up: a new round, or the grace rewind
    scale = v; minScaleReached = v;
    art.style.setProperty("--scale", v);
    $("pointsNow").textContent = potential();
    $("zoomLvl").textContent = "×" + v.toFixed(1);
  }

  function applyFocal(p) {
    art.style.setProperty("--fx", (p.focal.x * 100) + "%");
    art.style.setProperty("--fy", (p.focal.y * 100) + "%");
  }

  // Auto-pick a focal point on the most detailed region (highest local
  // brightness stddev on a small probe copy). Only runs when focal is still
  // the default center — hand-tuned values in the data always win.
  function computeFocal(p, done) {
    if (p._focalDone || p.focal.x !== 0.5 || p.focal.y !== 0.5) { p._focalDone = true; return done(); }
    const probe = new Image();
    probe.crossOrigin = "anonymous";
    probe.onload = () => {
      try {
        const S = 96, G = 8, cell = S / G;
        const c = document.createElement("canvas");
        c.width = S; c.height = S;
        const ctx = c.getContext("2d", { willReadFrequently: true });
        ctx.drawImage(probe, 0, 0, S, S);
        const d = ctx.getImageData(0, 0, S, S).data;
        const SKIN_AVOID = 0.85;  // 0 = ignore skin, 1 = skin-heavy cells score ~0
        let best = -1, bx = 0.5, by = 0.5;
        for (let gy = 1; gy < G - 1; gy++) {        // skip outer ring: keep the
          for (let gx = 1; gx < G - 1; gx++) {      // focal away from the frame
            let sum = 0, sum2 = 0, skin = 0;
            for (let y = gy * cell; y < (gy + 1) * cell; y++) {
              for (let x = gx * cell; x < (gx + 1) * cell; x++) {
                const i = (y * S + x) * 4;
                const r = d[i], g = d[i + 1], b = d[i + 2];
                const lum = 0.299 * r + 0.587 * g + 0.114 * b;
                sum += lum; sum2 += lum * lum;
                // crude flesh-tone test: warm, red-dominant, not grey
                if (r > 95 && g > 40 && b > 20 && r > g && r > b &&
                    (r - Math.min(g, b)) > 15 && Math.abs(r - g) > 15) skin++;
              }
            }
            const n = cell * cell;
            const sd = Math.sqrt(Math.max(0, sum2 / n - (sum / n) ** 2));
            const score = sd * (1 - SKIN_AVOID * (skin / n));  // detail wins, faces lose
            if (score > best) { best = score; bx = (gx + 0.5) / G; by = (gy + 0.5) / G; }
          }
        }
        p.focal = { x: bx, y: by };
      } catch (e) { /* CORS-tainted canvas etc. — keep center */ }
      p._focalDone = true; done();
    };
    probe.onerror = () => { p._focalDone = true; done(); };
    // small copy: fast to fetch & scan. Original-file URLs (no NNNpx- segment)
    // get rewritten onto Wikimedia's thumb path instead of downloading megabytes.
    probe.src = /\/\d+px-/.test(p.img)
      ? p.img.replace(/\/\d+px-/, "/320px-")
      : p.img.replace(/\/commons\/(\w)\/(\w\w)\/([^\/]+)$/, "/commons/thumb/$1/$2/$3/320px-$3");
  }

  function startRound() {
    cur = deck[round];
    wrongMult = 1;
    $("roundNo").textContent = round + 1;
    art.src = cur.img;
    applyFocal(cur);
    computeFocal(cur, () => { if (cur === deck[round]) applyFocal(cur); });
    if (deck[round + 1]) computeFocal(deck[round + 1], () => {});  // prefetch next round's
    resetScale(cur.startScale);
    guessInput.value = ""; guessInput.disabled = false;
    document.querySelector("main").classList.remove("solving", "typing");
    setFlash(""); hideSuggestions(); hint.style.display = "";
  }

  function setFlash(msg, kind) { flash.textContent = msg; flash.className = "flash" + (kind ? " " + kind : ""); }

  // ---- autocomplete ----
  function matches(q) {
    q = q.trim().toLowerCase();
    if (!q) return [];
    return window.PAINTINGS.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.artist.toLowerCase().includes(q) ||
      (p.aliases || []).some(a => a.includes(q))
    ).slice(0, 8);
  }
  function renderSuggestions() {
    const list = matches(guessInput.value);
    if (!list.length) { hideSuggestions(); return; }
    suggestions.innerHTML = list.map((p, i) =>
      `<div class="item${i === activeSugg ? " active" : ""}" data-id="${p.id}">${p.title} <small>· ${p.artist}</small></div>`
    ).join("");
    suggestions.hidden = false;
    suggestions.querySelectorAll(".item").forEach(el =>
      el.addEventListener("pointerdown", (e) => { e.preventDefault(); submitGuess(parseInt(el.dataset.id, 10)); })
    );
  }
  function hideSuggestions() { suggestions.hidden = true; activeSugg = -1; }

  function submitGuess(id) {
    if (guessInput.disabled) return;
    if (id === cur.id) { endRound(potential(), true); return; }
    const before = potential();
    wrongMult *= (1 - WRONG_PENALTY_PCT);
    const wrong = window.PAINTINGS.find(p => p.id === id);
    setFlash(`Nicht „${wrong.title}“. −${before - potential()}`, "bad");
    $("pointsNow").textContent = potential();
    guessInput.value = ""; hideSuggestions();
  }

  function endRound(earned, won) {
    guessInput.disabled = true; guessInput.blur(); hideSuggestions();
    markSeen(cur.id);
    total += earned; $("total").textContent = total;
    $("revealImg").src = cur.img;
    $("revealTitle").textContent = cur.title;
    // eine Datenzeile statt Dachzeile + Ressort-Label: das hier ist ein Ergebnis
    $("revealBy").textContent = [cur.artist, cur.year, cur.period].filter(Boolean).join(" · ");
    $("revealDesc").textContent = cur.description || "";
    $("scorebox").style.display = "";
    const e = $("revealEarned");
    e.textContent = (won ? "+" : "") + earned;
    e.className = "earned" + (earned === 0 ? " zero" : "");
    $("nextBtn").textContent = (round + 1 < deck.length) ? "Nächstes Bild" : "Endstand ansehen";
    $("reveal").classList.add("show");
  }

  function next() {
    $("reveal").classList.remove("show");
    round++;
    if (round < deck.length) { startRound(); return; }
    $("revealImg").removeAttribute("src");
    $("revealTitle").textContent = "Geschafft!";
    $("revealBy").textContent = `${total} Punkte bei ${deck.length} Bildern.`;
    $("revealDesc").textContent = "";
    $("revealEarned").textContent = "";
    $("scorebox").style.display = "none";   // im Endstand gibt es keine Rundenpunkte
    $("nextBtn").textContent = "Noch einmal spielen";
    $("reveal").classList.add("show");
    deck = buildDeck(); round = -1;
  }

  // ---- touch / pointer zoom ----
  const pointers = new Map();
  let pinchStartDist = 0, pinchStartScale = 0;

  function dist() {
    const p = [...pointers.values()];
    return Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
  }
  stage.addEventListener("pointerdown", (e) => {
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 2) { pinchStartDist = dist(); pinchStartScale = scale; }
    hint.style.display = "none";
  });
  stage.addEventListener("pointermove", (e) => {
    if (!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 2 && pinchStartDist > 0) {
      e.preventDefault();
      setScale(pinchStartScale * Math.pow(dist() / pinchStartDist, PINCH_SENS));
    }
  });
  function dropPointer(e) {
    pointers.delete(e.pointerId);
    if (pointers.size < 2) pinchStartDist = 0;
  }
  stage.addEventListener("pointerup", dropPointer);
  stage.addEventListener("pointercancel", dropPointer);
  stage.addEventListener("pointerleave", dropPointer);

  // hold = fluid continuous zoom-out; quick tap = small nudge
  const zoomBtn = $("zoomout");
  let rafId = null, lastT = 0, holdStart = 0, holdStartScale = 0, settleTimer = null;
  let trail = [];  // recent {t, scale} of this hold — the grace rewind reads its front
  function holdLoop(t) {
    if (lastT) {
      const ramp = Math.min(1, ((t - holdStart) / 1000) / ZOOM_HOLD_RAMP);
      const speed = ZOOM_HOLD_START + (ZOOM_HOLD_FULL - ZOOM_HOLD_START) * ramp;
      setScale(scale * Math.pow(speed, (t - lastT) / 1000));
    }
    lastT = t;
    trail.push({ t: t, scale: scale });
    // drop anything the rewind can no longer need: keep exactly one frame older than
    // GRACE_MS at the front, so trail[0] is the scale we had 300ms ago
    while (trail.length > 1 && trail[1].t <= t - GRACE_MS) trail.shift();
    rafId = requestAnimationFrame(holdLoop);
  }
  // hand back the last GRACE_MS of glide: your reaction time shouldn't cost points.
  // Rewinding the image (rather than just the price) keeps this un-exploitable —
  // tapping repeatedly can't farm free zoom, because every release undoes itself.
  function rewind(v) {
    if (v <= scale) return;
    art.classList.add("settling");   // animate it, so it reads as intent, not as a glitch
    resetScale(v);
    clearTimeout(settleTimer);
    settleTimer = setTimeout(() => art.classList.remove("settling"), 250);
  }
  zoomBtn.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    zoomBtn.setPointerCapture(e.pointerId);
    clearTimeout(settleTimer);
    art.classList.remove("settling");  // never let the settle transition slow the live glide
    zoomBtn.classList.add("holding");
    holdStart = performance.now(); lastT = 0; holdStartScale = scale; trail = [];
    rafId = requestAnimationFrame(holdLoop);
  });
  // One rule for every press, no threshold to fall through: a press always moves at least
  // as far as a tap, and anything beyond that gets the last GRACE_MS refunded. Without the
  // tap floor, a short press would rewind itself to a standstill and read as a dead button.
  function endHold() {
    zoomBtn.classList.remove("holding");
    if (rafId === null) return;
    cancelAnimationFrame(rafId); rafId = null;
    const graceTarget = trail.length ? trail[0].scale : holdStartScale;   // where we were 300ms ago
    const target = Math.min(graceTarget, holdStartScale * ZOOM_TAP_FACTOR);
    if (target > scale) rewind(target);   // held a while: hand the reaction time back
    else setScale(target);                // barely pressed: still worth a tap's nudge
  }
  zoomBtn.addEventListener("pointerup", endHold);
  zoomBtn.addEventListener("pointercancel", endHold);

  stage.addEventListener("wheel", (e) => {  // desktop convenience (outward only)
    e.preventDefault();
    if (e.deltaY > 0) setScale(scale - 0.25);
  }, { passive: false });

  // iOS Safari ignores user-scalable=no: stop it hijacking the pinch for page zoom
  document.addEventListener("gesturestart", (e) => e.preventDefault());
  stage.addEventListener("touchmove", (e) => e.preventDefault(), { passive: false });

  // ---- text input ----
  guessInput.addEventListener("input", () => { activeSugg = -1; renderSuggestions(); });
  guessInput.addEventListener("keydown", (e) => {
    const n = suggestions.hidden ? 0 : suggestions.querySelectorAll(".item").length;
    if (e.key === "ArrowDown") { e.preventDefault(); activeSugg = Math.min(n - 1, activeSugg + 1); renderSuggestions(); }
    else if (e.key === "ArrowUp") { e.preventDefault(); activeSugg = Math.max(0, activeSugg - 1); renderSuggestions(); }
    else if (e.key === "Enter") {
      const list = matches(guessInput.value); if (!list.length) return;
      submitGuess((activeSugg >= 0 ? list[activeSugg] : list[0]).id);
    } else if (e.key === "Escape") hideSuggestions();
  });
  guessInput.addEventListener("blur", () => setTimeout(hideSuggestions, 150));

  $("giveup").addEventListener("click", () => endRound(0, false));
  $("nextBtn").addEventListener("click", next);

  // ---- keyboard-aware panel: lift by the keyboard's height, no more ----
  const vv = window.visualViewport;
  function vvUpdate() {
    const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
    document.documentElement.style.setProperty("--kb", kb + "px");
  }
  if (vv) { vv.addEventListener("resize", vvUpdate); vv.addEventListener("scroll", vvUpdate); }

  const mainEl = document.querySelector("main");
  guessInput.addEventListener("focus", () => mainEl.classList.add("typing"));
  guessInput.addEventListener("blur", () => {
    mainEl.classList.remove("typing");
    setTimeout(() => mainEl.classList.remove("solving"), 150);  // back to the three buttons
  });
  $("solve").addEventListener("click", () => {
    if (guessInput.disabled) return;
    mainEl.classList.add("solving");
    guessInput.focus();  // inside the tap handler, so the phone keyboard opens
  });

  // ---- tap the painting to toggle the chrome (zen view) ----
  let tapCand = null, wasPinch = false;
  stage.addEventListener("pointerdown", (e) => {
    if (pointers.size === 1) { tapCand = { x: e.clientX, y: e.clientY, t: performance.now() }; wasPinch = false; }
    else { tapCand = null; wasPinch = true; }  // second finger: this gesture is a pinch
  });
  stage.addEventListener("pointermove", (e) => {
    if (pointers.size > 1) { wasPinch = true; tapCand = null; }
    if (tapCand && (Math.abs(e.clientX - tapCand.x) > 12 || Math.abs(e.clientY - tapCand.y) > 12)) tapCand = null;
  });
  stage.addEventListener("pointerup", () => {
    if (tapCand && !wasPinch && performance.now() - tapCand.t < 350) {
      guessInput.blur();
      document.body.classList.toggle("zen");
    }
    tapCand = null;
  });
  stage.addEventListener("pointercancel", () => { tapCand = null; });
  $("showui").addEventListener("click", () => document.body.classList.remove("zen"));

  // ---- boot ----
  if (!window.PAINTINGS || !window.PAINTINGS.length) {
    document.querySelector("main").innerHTML = "<p style='color:var(--muted);padding:20px'>Keine Bilder geladen.</p>";
    return;
  }
  deck = buildDeck();
  $("roundTot").textContent = deck.length;
  startRound();
})();
</script>
</body>
</html>
