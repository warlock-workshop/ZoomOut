<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App-Icon: ein Detail in der Mitte, Zoom-Rahmen nach außen, rotes Zoom-Badge.
       Farben aus der Vorlage-App gemessen: Grund #111111, Linie #2C2C2C, Signalrot #E0352F -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#111111"/>
  <rect x="6" y="6" width="500" height="500" rx="108" fill="none" stroke="#2C2C2C" stroke-width="6"/>

  <!-- Zoom-Rahmen, nach außen hin schwächer. Eckig wie das Raster der App. -->
  <rect x="106" y="86" width="300" height="300" fill="none" stroke="#F5F6F6" stroke-opacity="0.22" stroke-width="10"/>
  <rect x="146" y="126" width="220" height="220" fill="none" stroke="#F5F6F6" stroke-opacity="0.50" stroke-width="10"/>
  <rect x="186" y="166" width="140" height="140" fill="none" stroke="#F5F6F6" stroke-opacity="0.85" stroke-width="10"/>

  <!-- der Ausschnitt, auf dem man startet -->
  <rect x="227" y="207" width="58" height="58" fill="#F5F6F6"/>

  <!-- Zoom-Badge in der Signalfarbe -->
  <circle cx="368" cy="398" r="66" fill="#E0352F"/>
  <rect x="334" y="389" width="68" height="18" rx="9" fill="#111111"/>
</svg>
