<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App-Icon: eine Lupe, in der Linse der Ausschnitt, den du zu sehen bekommst —
       die Spielidee in einem Zeichen.
       Randlos und ohne Transparenz: iOS maskiert Homescreen-Icons selbst und füllt
       Alpha mit Schwarz. Eigene runde Ecken gäben doppelte Kanten. -->
  <rect width="512" height="512" fill="#111111"/>
  <line x1="310" y1="300" x2="424" y2="414" stroke="#F5F6F6" stroke-width="42" stroke-linecap="round"/>
  <circle cx="225" cy="215" r="130" fill="none" stroke="#F5F6F6" stroke-width="26"/>
  <rect x="177" y="167" width="96" height="96" fill="#E0352F"/>
</svg>
